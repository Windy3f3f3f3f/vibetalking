<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice2Text</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="popover">
    <div class="pop-wrap">
      <header class="pop-header">
        <div class="pop-title">转录历史</div>
        <div class="pop-status" id="status">
          <span class="dot" id="dot"></span>
          <span id="status-text">就绪 · 按住 Fn 说话</span>
        </div>
      </header>
      <main class="pop-body">
        <ul id="list" class="hist-list"></ul>
        <div id="empty" class="empty-state">
          <div class="empty-icon">🎙</div>
          <div>按住快捷键开始录音</div>
        </div>
      </main>
      <footer class="pop-footer">
        <button class="link-btn" id="clear">清空</button>
        <div class="footer-spacer"></div>
        <button class="link-btn" id="settings">设置…</button>
        <button class="link-btn danger" id="quit">退出</button>
      </footer>
    </div>
    <script type="module" src="./popover.ts"></script>
  </body>
</html>
